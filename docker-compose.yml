version: "3.9"
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///./app.db}
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
      - SCHEDULE_TZ=${SCHEDULE_TZ:-Asia/Tokyo}
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
